name: vida_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.2+0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.3
  xml: ^6.5.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  speech_to_text: ^7.3.0
  flutter_svg: ^2.0.9
  package_info_plus: ^8.0.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  google_sign_in: ^6.2.1
  health: ^13.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/axyo_foreground.png"
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: "assets/icons/axyo_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    - assets/models/female/
    - assets/models/male/
